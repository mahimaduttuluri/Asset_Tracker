<div class="dashboard-layout">

  <!-- SIDE NAV -->
  <app-side-nav (isOpenChange)="isSideNavOpen = $event"></app-side-nav>

  <!-- MAIN CONTENT -->
  <div
    class="dashboard-content"
    [ngStyle]="{ 'margin-left.px': isSideNavOpen ? 105 : 20 }"
  >

    <!-- TOP DASHBOARD SPLIT -->
    <div class="top-dashboard-layout">

      <!-- LEFT PANEL : SITES -->
      <div class="left-panel">

        <div class="sites-container">

          <!-- HEADER -->
          <div class="sites-header">
            <div>
              <h4>Sites</h4>
              <div class="sites-count">{{ sites.length }} sites</div>
            </div>
          </div>

          <!-- MAP + KPI CONTENT -->
          <div class="sites-content">

            <!-- MAP -->
            <div id="sitesMap" class="sites-map"></div>

            <!-- STATS -->
            <div class="sites-stats">

              <div class="stat-card">
                <div class="stat-icon">
                  <img src="/icons/robotic-arm.png" alt="Total Assets" />
                </div>
                <div class="stat-info">
                  <div class="stat-label">Total Assets</div>
                  <div class="stat-value">{{ totalAssets }}</div>
                </div>
              </div>

              <div class="stat-card danger">
                <div class="stat-icon">
                  <img src="/icons/remove.png" alt="Not Reporting" />
                </div>
                <div class="stat-info">
                  <div class="stat-label">Not Reporting</div>
                  <div class="stat-value">7</div>
                </div>
              </div>

              <div class="stat-card success">
                <div class="stat-icon">
                  <img src="/icons/tasks.png" alt="Active" />
                </div>
                <div class="stat-info">
                  <div class="stat-label">Active</div>
                  <div class="stat-value">18</div>
                </div>
              </div>
            </div>

          </div>
        </div>

      </div>

      <!-- RIGHT PANEL : ASSET TYPES + DETAILS -->
      <div class="right-panel">

        <!-- ASSET TYPES (VERTICAL) -->
        <div class="asset-types-vertical">
          <h4>Asset Types</h4>

          <div class="asset-type-list">
            <div
              class="asset-type-item"
              *ngFor="let asset of assetSummary"
            >
              <img
                [src]="asset.icon"
                [alt]="asset.nameLine1 + ' ' + asset.nameLine2"
              />

              <div>
                <div class="asset-name">
                  {{ asset.nameLine1 }} {{ asset.nameLine2 }}
                </div>
                <div class="asset-count-small">
                  {{ asset.count }}/{{ asset.total }}
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- ASSET DETAILS CARD -->
        <div class="asset-details-card">
          <h4>Asset Details</h4>

          <p>
            View detailed information, status, and utilisation of assets
            across all sites.
          </p>

<button class="primary-btn" (click)="viewAssetDetails()">
            View Asset Details →
          </button>
        </div>

      </div>
    </div>

  </div>
</div>
