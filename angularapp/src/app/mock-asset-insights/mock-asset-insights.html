<div class="layout">
  <app-side-nav></app-side-nav>

  <div class="page-content">
    <h2>Asset Insights</h2>

    <div class="asset-container">
      <div class="asset-card" *ngFor="let asset of assets">
        
        <div class="asset-header">
          <div>
            <h3>{{ asset.assetId }}</h3>
            <p>{{ asset.assetType }}</p>
          </div>

          <span class="status" [ngClass]="asset.status.toLowerCase()">
            {{ asset.status }}
          </span>
        </div>

        <div class="asset-body">
          <p><strong>Speed:</strong> {{ asset.speed }} km/h</p>
          <p><strong>Last Updated:</strong> {{ asset.lastUpdated }}</p>
        </div>

        <button class="track-btn" (click)="trackLive(asset.assetId)"> Track Live </button>

      </div>
    </div>
  </div>
</div>
