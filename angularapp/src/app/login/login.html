<div class="page page-layout">
  <!-- Left Panel with Image -->
  <div class="left-panel">
    <img src="/Login-hero-1.png" alt="Asset Tracker Pro" class="login-image">
  </div>

  <!-- Right Panel with Form -->
  <div class="right-panel">
    <div class="card">
      <div class="card-header">
        <h1>Asset Tracker</h1>
        <p class="subtitle">Asset Live Tracking</p>
      </div>

      <div class="tabs-container">
        <div class="tabs">
          <button type="button" class="tab" [class.active]="mode === 'signin'" (click)="setMode('signin')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Sign In
          </button>
          <button type="button" class="tab" [class.active]="mode === 'signup'" (click)="setMode('signup')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="8.5" cy="7" r="4"/>
              <line x1="20" y1="8" x2="20" y2="14"/>
              <line x1="23" y1="11" x2="17" y2="11"/>
            </svg>
            Sign Up
          </button>
        </div>
      </div>

      <!-- Sign In Form -->
      <form *ngIf="mode === 'signin' && !showFaceLogin" (ngSubmit)="onSubmit()" class="form">
        <div class="form-group">
          <label class="label">
            <span class="label-text">Username or Email</span>
            <div class="input-wrapper">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input class="input" name="signinUsername" [(ngModel)]="username" autocomplete="username" placeholder="Enter your username" required />
            </div>
          </label>
        </div>

        <div class="form-group">
          <label class="label">
            <span class="label-text">Password</span>
            <div class="input-wrapper">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                class="input"
                type="password"
                name="signinPassword"
                [(ngModel)]="password"
                autocomplete="current-password"
                placeholder="Enter your password"
                required
              />
            </div>
          </label>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" class="checkbox">
            <span class="checkmark"></span>
            Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
          <span *ngIf="!isSubmitting">Sign In</span>
          <span *ngIf="isSubmitting" class="loading">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12a9 9 0 11-6.219-8.56"/>
            </svg>
            Signing in...
          </span>
        </button>
      </form>

      <!-- Sign Up Form -->
      <form *ngIf="mode === 'signup'" (ngSubmit)="onRegister()" class="form">
        <div class="form-group">
          <label class="label">
            <span class="label-text">Username</span>
            <div class="input-wrapper">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input class="input" name="signupUsername" [(ngModel)]="signupUsername" autocomplete="username" placeholder="Choose a username" required />
            </div>
          </label>
        </div>

        <div class="form-group">
          <label class="label">
            <span class="label-text">Email</span>
            <div class="input-wrapper">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input class="input" type="email" name="signupEmail" [(ngModel)]="signupEmail" autocomplete="email" placeholder="your@email.com" />
            </div>
          </label>
        </div>

        <div class="form-group">
          <label class="label">
            <span class="label-text">Password</span>
            <div class="input-wrapper">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                class="input"
                type="password"
                name="signupPassword"
                [(ngModel)]="signupPassword"
                autocomplete="new-password"
                placeholder="Create a strong password"
                required
              />
            </div>
          </label>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" class="checkbox" required>
            <span class="checkmark"></span>
            I agree to the <a href="#" class="terms-link">Terms & Conditions</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
          <span *ngIf="!isSubmitting">Create Account</span>
          <span *ngIf="isSubmitting" class="loading">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12a9 9 0 11-6.219-8.56"/>
            </svg>
            Creating...
          </span>
        </button>
      </form>

      <!-- Face Login -->
      <div *ngIf="showFaceLogin" class="face-login-container">
        <div class="video-wrapper">
          <video #videoElement autoplay muted playsinline class="video-element"></video>
          <canvas #canvasElement class="video-overlay"></canvas>
          <div class="video-frame">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
          </div>
        </div>
        <div class="face-login-info">
          <p class="face-login-text">Position your face in the frame</p>
        </div>
        <button type="button" class="btn btn-primary" (click)="toggleFaceLogin()" style="margin-top: 16px;">
          Cancel Face Login
        </button>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="alert alert-error">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        {{ errorMessage }}
      </div>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="sso-container">
        <button type="button" class="btn btn-face" (click)="toggleFaceLogin()" *ngIf="!showFaceLogin && mode === 'signin'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Login with Face
        </button>
        
        <div id="googleSignInButton" style="display: flex; justify-content: center; margin-bottom: 12px;"></div>
        
        <button type="button" class="btn btn-google" (click)="loginWithAzureAd()">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M9.5 0H0v9.5h9.5V0z" fill="#f25022"/>
            <path d="M20 0h-9.5v9.5H20V0z" fill="#00a4ef"/>
            <path d="M9.5 10.5H0V20h9.5v-9.5z" fill="#7fba00"/>
            <path d="M20 10.5h-9.5V20H20v-9.5z" fill="#ffb900"/>
          </svg>
          Sign in with Microsoft
        </button>
      </div>

      <p class="security-note">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Your data is secure and encrypted
      </p>
    </div>
  </div>
</div>
